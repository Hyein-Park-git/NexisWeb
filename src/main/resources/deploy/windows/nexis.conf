# ==============================================
#  Nexis Web Configuration
#  This file is automatically generated during
#  installation. Edit with caution.
# ==============================================

# ---------------------------------------------------------------
# Database
# db.type options: MySQL / MariaDB / PostgreSQL
# db.host     : database server hostname or IP
# db.port     : database server port
#               (MySQL/MariaDB default: 3306, PostgreSQL default: 5432)
# db.name     : database (schema) name
# db.user     : database user
# db.password : database password
# ---------------------------------------------------------------
db.type=MySQL
db.host=
db.port=3306
db.name=nexis
db.user=
db.password=

# ---------------------------------------------------------------
# Nexis Server Connection
# server.host : IP address or hostname of Nexis Server
# server.port : TCP port of Nexis Server (default: 9000)
# server.name : Display name for Nexis Server
# ---------------------------------------------------------------
server.host=
server.port=9000
server.name=Nexis Server

# ---------------------------------------------------------------
# Installation Status
# Do not modify this value manually.
# Set to 'true' automatically after installation is complete.
# ---------------------------------------------------------------
installed=false