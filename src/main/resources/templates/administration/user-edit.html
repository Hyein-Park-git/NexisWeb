<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

<input type="hidden" id="canWriteData" th:value="${canWriteAdmin}">

  <!-- ══ Group Select 모달 ══ -->
  <div id="groupSelectModal" class="modal-backdrop" style="display:none;">
    <div class="modal-box" style="max-width:500px;">
      <div class="modal-head">
        <span class="modal-title">Select User Groups</span>
        <button class="modal-close" onclick="closeGroupSelectModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="13" y1="1" x2="1"  y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" style="padding:14px 20px;">
        <input type="text" class="search-input" id="groupModalSearch"
               placeholder="Search groups…" oninput="filterGroupModal(this.value)"
               style="width:100%;margin-bottom:10px;">
        <div id="groupModalList" style="display:flex;flex-direction:column;gap:5px;max-height:400px;overflow-y:auto;"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="closeGroupSelectModal()">Cancel</button>
        <button class="btn btn-primary"   onclick="closeGroupSelectModal()">OK</button>
      </div>
    </div>
  </div>

  <style>
    .ug-tag-box{display:flex;flex-wrap:wrap;align-items:center;gap:4px;min-height:36px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:text;flex:1;}
    .ug-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 10px;background:color-mix(in srgb,var(--accent) 15%,transparent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);border-radius:3px;font-size:12.5px;color:var(--text);white-space:nowrap;}
    .ug-tag-x{background:none;border:none;cursor:pointer;padding:0;line-height:1;color:var(--text-muted);font-size:14px;display:flex;align-items:center;}
    .ug-tag-x:hover{color:var(--danger);}
    .ug-tag-search{border:none;outline:none;background:transparent;font-size:13px;color:var(--text);min-width:120px;flex:1;padding:2px 0;}
    .ug-tag-search::placeholder{color:var(--text-muted);}
    .ug-modal-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--raised);transition:border-color .12s,background .12s;}
    .ug-modal-row:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,transparent);}
    .ug-modal-row.ug-sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);}
    .form-control:disabled {opacity: 0.7; background: var(--raised); cursor: not-allowed;}
  </style>

  <!-- hidden 데이터 -->
  <input type="hidden" id="editUserId"     th:value="${editUser.id}">
  <input type="hidden" id="initGroupIds"   th:value="${userGroupIds}">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    <a href="/administration/users" class="btn btn-secondary btn-sm">← Users</a>
    <span style="font-size:16px;font-weight:600;color:var(--text);">Edit User</span>
    <span class="badge badge-muted td-mono" th:text="${editUser.username}">—</span>
  </div>

  <div class="card" style="max-width:660px;">
    <div class="card-header"><span class="card-title">User</span></div>
    <div style="padding:28px 28px 20px;">

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" th:value="${editUser.username}"
               readonly style="opacity:.6;cursor:not-allowed;background:var(--raised);max-width:320px;">
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Username cannot be changed.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="editFullName"
               th:value="${editUser.fullName ?: ''}" th:attr="disabled=${!canWriteAdmin}" placeholder="Hailey Park" style="max-width:320px;">
      </div>

      <div class="form-group">
        <label class="form-label">Groups</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="ug-tag-box" id="ugTagBox" onclick="focusUgSearch()">
            <input type="text" class="ug-tag-search" id="ugTagSearch"
                   placeholder="type here to search"
                   oninput="onUgSearchInput(this.value)"
                   onkeydown="onUgSearchKey(event)"
                   th:attr="disabled=${!canWriteAdmin}">
          </div>
          <button type="button" class="btn btn-secondary" onclick="openGroupSelectModal()" th:attr="disabled=${!canWriteAdmin}" style="white-space:nowrap;flex-shrink:0;">Select</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="editPassword" th:attr="disabled=${!canWriteAdmin}" style="max-width:320px;" placeholder="Leave empty to keep current">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="editPasswordConfirm" th:attr="disabled=${!canWriteAdmin}" style="max-width:320px;">
      </div>

      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-control" id="editRole" th:attr="disabled=${!canWriteAdmin}" style="max-width:200px;">
          <option value="User"     th:selected="${editUser.role == 'User'}">User</option>
          <option value="Operator" th:selected="${editUser.role == 'Operator'}">Operator</option>
          <option value="Admin"    th:selected="${editUser.role == 'Admin'}">Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="editDescription"  rows="3"
                  style="height:auto;resize:vertical;max-width:480px;"
                  th:text="${editUser.description ?: ''}" th:attr="disabled=${!canWriteAdmin}"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="editEnabled" th:attr="disabled=${!canWriteAdmin}" style="max-width:200px;">
          <option value="true"  th:selected="${editUser.enabled}">Active</option>
          <option value="false" th:selected="${!editUser.enabled}">Inactive</option>
        </select>
      </div>

      <div id="formError" class="modal-error" style="display:none;border-radius:4px;padding:8px 12px;margin-bottom:16px;max-width:480px;"></div>

      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="submitEditUser()">Update</button>
        <a href="/administration/users" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </div>

  <script>
  (function(){
	  
	  var CAN_WRITE = document.getElementById('canWriteData')?.value === 'true';

	  if(!CAN_WRITE){
	    var btn = document.querySelector('.btn-primary[onclick="submitEditUser()"]');
	    if(btn) btn.style.display = 'none';
	  }
	  
    var USER_ID     = parseInt(document.getElementById('editUserId').value) || 0;
    var allGroups   = [];
    var filteredGroups = [];
    var selectedIds = [];

    /* ── 초기 그룹 로드 ── */
    // initGroupIds는 Thymeleaf가 [1, 2, 3] 형식으로 렌더링
    var initRaw = document.getElementById('initGroupIds').value || '[]';
    try {
      // Thymeleaf list → "[1, 2, 3]" 형식 파싱
      selectedIds = initRaw.replace(/[\[\]\s]/g,'').split(',').filter(Boolean).map(Number);
    } catch(e){ selectedIds = []; }

    fetch('/api/user-groups')
      .then(function(r){ return r.json(); })
      .then(function(data){
        allGroups      = data;
        filteredGroups = data.slice();
        renderTags();
      }).catch(function(){});

    /* ── 태그박스 ── */
    window.focusUgSearch = function(){ document.getElementById('ugTagSearch').focus(); };

    function renderTags(){
      var box   = document.getElementById('ugTagBox');
      var input = document.getElementById('ugTagSearch');
      box.querySelectorAll('.ug-tag').forEach(function(el){ el.remove(); });
      selectedIds.forEach(function(id){
        var g = allGroups.find(function(x){ return x.id === id; });
        if(!g) return;
        var tag = document.createElement('span');
        tag.className = 'ug-tag';
        tag.innerHTML = esc(g.name) +
          '<button type="button" class="ug-tag-x" onclick="removeTag('+id+')">&#215;</button>';
        box.insertBefore(tag, input);
      });
    }

    window.removeTag = function(id){
      selectedIds = selectedIds.filter(function(x){ return x !== id; });
      renderTags();
      renderGroupModalList();
    };

    /* ── Group Select 모달 ── */
    window.openGroupSelectModal = function(){
    	if(!CAN_WRITE) return;
      filteredGroups = allGroups.slice();
      document.getElementById('groupModalSearch').value = '';
      renderGroupModalList();
      document.getElementById('groupSelectModal').style.display = 'flex';
    };
    window.closeGroupSelectModal = function(){
      document.getElementById('groupSelectModal').style.display = 'none';
    };
    window.filterGroupModal = function(kw){
      kw = kw.toLowerCase();
      filteredGroups = allGroups.filter(function(g){
        return g.name.toLowerCase().includes(kw)||(g.description||'').toLowerCase().includes(kw);
      });
      renderGroupModalList();
    };
    function renderGroupModalList(){
      var el = document.getElementById('groupModalList');
      if(!filteredGroups.length){
        el.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:13px;">No groups found.</div>';
        return;
      }
      el.innerHTML = filteredGroups.map(function(g){
        var isSel = selectedIds.includes(g.id);
        return '<div class="ug-modal-row'+(isSel?' ug-sel':'')+'" onclick="toggleGroup('+g.id+')">'+
          '<div>'+
            '<span style="font-size:13px;font-weight:600;color:var(--text);">'+esc(g.name)+'</span>'+
            (g.description?'<span style="font-size:11.5px;color:var(--text-muted);margin-left:8px;">'+esc(g.description)+'</span>':'')+
          '</div>'+
          (isSel?'<span class="badge badge-ok" style="font-size:11px;">Selected</span>':'')+
        '</div>';
      }).join('');
    }
    window.toggleGroup = function(id){
    	if(!CAN_WRITE) return;
      if(selectedIds.includes(id)){ selectedIds=selectedIds.filter(function(x){return x!==id;}); }
      else{ selectedIds.push(id); }
      renderTags();
      renderGroupModalList();
    };
    window.onUgSearchInput = function(kw){
      if(kw.trim()){
        if(document.getElementById('groupSelectModal').style.display!=='flex') openGroupSelectModal();
        filterGroupModal(kw);
      }
    };
    window.onUgSearchKey = function(e){ if(e.key==='Enter') openGroupSelectModal(); };

    /* ── Submit ── */
    window.submitEditUser = function(){
    	if(!CAN_WRITE) return;
      var password        = document.getElementById('editPassword').value;
      var passwordConfirm = document.getElementById('editPasswordConfirm').value;
      var errEl           = document.getElementById('formError');
      errEl.style.display = 'none';

      if(password && password !== passwordConfirm){
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }
      if(password && password.length < 4){
        errEl.textContent = 'Password must be at least 4 characters.';
        errEl.style.display = 'block';
        return;
      }

      var payload = {
        fullName:    document.getElementById('editFullName').value.trim(),
        description: document.getElementById('editDescription').value.trim(),
        role:        document.getElementById('editRole').value,
        enabled:     document.getElementById('editEnabled').value === 'true',
        groupIds:    selectedIds
      };
      if(password) payload.password = password;

      fetch('/api/users/'+USER_ID, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-CSRF-TOKEN':getCsrf()},
        body: JSON.stringify(payload)
      }).then(function(r){ return r.json(); }).then(function(d){
        if(d.success){ location.href='/administration/users'; }
        else{ errEl.textContent=d.error||'Failed.'; errEl.style.display='block'; }
      }).catch(function(){ errEl.textContent='Request failed.'; errEl.style.display='block'; });
    };

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  })();
  </script>

</div>
</body>
</html>
