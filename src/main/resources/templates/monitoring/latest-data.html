<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

  <!-- ══ Host Group 모달 ══ -->
  <div id="groupFilterModal" class="modal-backdrop" style="display:none;">
    <div class="modal-box" style="max-width:460px;">
      <div class="modal-head">
        <span class="modal-title">Filter by Host Group</span>
        <button class="modal-close" onclick="closeGroupModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="13" y1="1" x2="1"  y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" style="padding:14px 20px;">
        <input type="text" class="search-input" id="groupModalSearch"
               placeholder="Search groups…" oninput="filterGroupModalList(this.value)"
               style="width:100%;margin-bottom:10px;">
        <div id="groupModalList" style="display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto;"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="clearGroupFilter()">Clear filter</button>
        <button class="btn btn-secondary" onclick="closeGroupModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left" style="gap:6px;flex-wrap:wrap;">
      <select class="form-control" id="hostSelect"
              style="width:200px;height:34px;font-size:13px;"
              onchange="doFilter()">
        <option value="">All hosts</option>
        <option th:each="m : ${metrics}"
                th:value="${m.hostname}"
                th:text="${m.hostname}">—</option>
      </select>
      <input type="text" class="search-input" id="latestSearch"
             placeholder="Search hostname…"
             style="width:200px;"
             onkeydown="if(event.key==='Enter') doFilter()">
      <button class="btn btn-primary" onclick="doFilter()">Search</button>
      <button class="btn btn-secondary" onclick="resetFilter()">Reset</button>
      <button class="btn btn-secondary" id="groupFilterBtn" onclick="openGroupModal()" style="display:flex;align-items:center;gap:5px;">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="3" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="5" y="11" width="6" height="2" rx="1" fill="currentColor"/></svg>
        <span id="groupFilterLabel">Group</span>
      </button>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-secondary" onclick="location.href=location.href">↻ Refresh</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Latest Data</span>
      <span class="card-count" id="rowCount"></span>
    </div>
    <table class="data-table" id="latestTable">
      <thead>
        <tr>
          <th>Hostname</th><th>IP Address</th><th>OS</th>
          <th>Agent</th><th>Last Check</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(metrics)}">
          <td colspan="5" class="table-empty">No hosts found.</td>
        </tr>
        <tr th:each="m : ${metrics}" class="host-row"
            th:data-hostname="${m.hostname}">
          <td class="td-mono td-bold">
            <a th:href="@{/monitoring/latest-data/{id}(id=${m.id})}"
               style="color:var(--accent);text-decoration:none;"
               th:text="${m.hostname}">—</a>
          </td>
          <td class="td-mono" th:text="${m.ipAddress ?: '—'}">—</td>
          <td th:text="${m.os ?: '—'}">—</td>
          <td>
            <span th:if="${m.agentActive != null and m.agentActive}"
                  class="badge badge-ok">Active</span>
            <span th:unless="${m.agentActive != null and m.agentActive}"
                  class="badge badge-danger">Inactive</span>
          </td>
          <td class="td-mono td-muted"
              th:text="${m.agentLastCheck != null ? #temporals.format(m.agentLastCheck,'yyyy-MM-dd HH:mm') : '—'}">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
  (function(){
    var allGroups      = [];
    var filteredGroups = [];
    var activeGroupId  = null;
    var activeGroupHostnames = [];

    /* ── 초기 rowCount ── */
    var rows = document.querySelectorAll('.host-row');
    var el   = document.getElementById('rowCount');
    if(el && rows.length) el.textContent = rows.length + ' hosts';

    /* ── 필터 ── */
    window.doFilter = function(){
      var selected = document.getElementById('hostSelect').value.toLowerCase();
      var kw       = document.getElementById('latestSearch').value.toLowerCase();
      var visible  = 0;
      document.querySelectorAll('.host-row').forEach(function(row){
        var hostname  = (row.dataset.hostname || '').toLowerCase();
        var hostMatch = !selected || hostname === selected;
        var kwMatch   = !kw || hostname.includes(kw);
        var grpMatch  = !activeGroupId || activeGroupHostnames.includes(hostname);
        var show      = hostMatch && kwMatch && grpMatch;
        row.style.display = show ? '' : 'none';
        if(show) visible++;
      });
      document.getElementById('rowCount').textContent = visible + ' hosts';
    };

    window.resetFilter = function(){
      document.getElementById('hostSelect').value   = '';
      document.getElementById('latestSearch').value = '';
      activeGroupId        = null;
      activeGroupHostnames = [];
      document.getElementById('groupFilterLabel').textContent = 'Group';
      document.getElementById('groupFilterBtn').style.background = '';
      document.getElementById('groupFilterBtn').style.color = '';
      document.querySelectorAll('.host-row').forEach(function(r){ r.style.display = ''; });
      document.getElementById('rowCount').textContent = document.querySelectorAll('.host-row').length + ' hosts';
    };

    /* ── 그룹 모달 ── */
    window.openGroupModal = function(){
      document.getElementById('groupModalSearch').value = '';
      document.getElementById('groupFilterModal').style.display = 'flex';
      if(allGroups.length){
        filteredGroups = allGroups.slice();
        renderGroupModalList();
        return;
      }
      document.getElementById('groupModalList').innerHTML =
        '<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:13px;">Loading…</div>';
      fetch('/api/host-groups/available-groups')
        .then(function(r){return r.json();})
        .then(function(data){
          allGroups      = data;
          filteredGroups = data.slice();
          renderGroupModalList();
        }).catch(function(){
          document.getElementById('groupModalList').innerHTML =
            '<div style="text-align:center;padding:20px 0;color:var(--danger);font-size:13px;">Failed to load.</div>';
        });
    };

    window.closeGroupModal = function(){
      document.getElementById('groupFilterModal').style.display = 'none';
    };

    window.filterGroupModalList = function(kw){
      kw = kw.toLowerCase();
      filteredGroups = allGroups.filter(function(g){
        return g.name.toLowerCase().includes(kw) || (g.description||'').toLowerCase().includes(kw);
      });
      renderGroupModalList();
    };

    function renderGroupModalList(){
      var el = document.getElementById('groupModalList');
      if(!filteredGroups.length){
        el.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:13px;">No groups found.</div>';
        return;
      }
      el.innerHTML = filteredGroups.map(function(g){
        var isActive = g.id === activeGroupId;
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid '+(isActive?'var(--accent)':'var(--border)')+';border-radius:5px;cursor:pointer;background:'+(isActive?'color-mix(in srgb,var(--accent) 12%,transparent)':'var(--raised)')+';transition:border-color .12s,background .12s;" onclick="selectGroup('+g.id+',\''+escJ(g.name)+'\')">'+
          '<div>'+
            '<span style="font-size:13px;font-weight:600;color:var(--text);">'+esc(g.name)+'</span>'+
            (g.description?'<span style="font-size:12px;color:var(--text-muted);margin-left:8px;">'+esc(g.description)+'</span>':'')+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:8px;">'+
            '<span style="font-size:12px;color:var(--text-muted);">'+g.memberCount+' hosts</span>'+
            (isActive?'<span class="badge" style="font-size:11px;background:var(--accent);color:#fff;">Active</span>':'')+
          '</div>'+
        '</div>';
      }).join('');
    }

    window.selectGroup = function(id, name){
      activeGroupId = id;
      // 그룹 멤버 hostname 목록 가져오기
      fetch('/api/host-groups/'+id+'/members')
        .then(function(r){return r.json();})
        .then(function(members){
          activeGroupHostnames = members.map(function(m){ return m.hostname.toLowerCase(); });
          document.getElementById('groupFilterLabel').textContent = name;
          document.getElementById('groupFilterBtn').style.background = 'var(--accent)';
          document.getElementById('groupFilterBtn').style.color = '#fff';
          closeGroupModal();
          doFilter();
        });
    };

    window.clearGroupFilter = function(){
      activeGroupId        = null;
      activeGroupHostnames = [];
      document.getElementById('groupFilterLabel').textContent = 'Group';
      document.getElementById('groupFilterBtn').style.background = '';
      document.getElementById('groupFilterBtn').style.color = '';
      closeGroupModal();
      doFilter();
    };

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escJ(s){ return String(s||'').replace(/'/g,"\\'"); }

  })();
  </script>

</div>
</body>
</html>
