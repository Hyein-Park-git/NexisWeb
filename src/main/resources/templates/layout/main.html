<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="_csrf"        th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<title th:text="${pageTitle} + ' — Nexis'">Nexis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/nexis.css}">
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('nexis-theme')||'light'); })();</script>
</head>
<body>

<div class="shell" id="shell">

  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside class="sidebar" id="sidebar">

	<div class="sidebar-brand">
	  <a th:href="@{/monitoring/dashboard}" class="brand-link">
	    <img th:src="@{/images/nexis.png}" alt="Nexis"
	         style="height:32px;width:auto;object-fit:contain;">
	  </a>
	  <button class="sidebar-pin-btn" onclick="toggleSidebar()" title="Toggle sidebar">
	    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
	      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
	    </svg>
	  </button>
	</div>

    <nav class="sidebar-nav">

      <!-- Monitoring -->
      <div class="nav-group">
        <div class="nav-group-label">Monitoring</div>

        <a th:href="@{/monitoring/dashboard}"
           th:class="'nav-link' + (${activeMenu}=='dashboard' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg></span>
          <span class="nav-label">Dashboard</span>
        </a>

        <a th:href="@{/monitoring/hosts}"
           th:class="'nav-link' + (${activeMenu}=='hosts' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><circle cx="5" cy="8" r="1" fill="currentColor"/><circle cx="8" cy="8" r="1" fill="currentColor"/><circle cx="11" cy="8" r="1" fill="currentColor"/></svg></span>
          <span class="nav-label">Hosts</span>
        </a>

        <a th:href="@{/monitoring/latest-data}"
           th:class="'nav-link' + (${activeMenu}=='latest' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><polyline points="1,11 5,6 9,9 15,3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="15" cy="3" r="1.5" stroke="currentColor" stroke-width="1.2"/></svg></span>
          <span class="nav-label">Latest Data</span>
        </a>

        <a th:href="@{/monitoring/problems}"
           th:class="'nav-link' + (${activeMenu}=='problems' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L14.5 13H1.5L8 1.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><line x1="8" y1="6" x2="8" y2="9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.7" fill="currentColor"/></svg></span>
          <span class="nav-label">Problems</span>
        </a>
      </div>

      <!-- Configuration -->
      <div class="nav-group">
        <div class="nav-group-label">Configuration</div>

        <a th:href="@{/configuration/templates}"
           th:class="'nav-link' + (${activeMenu}=='templates' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="11" rx="1.2" stroke="currentColor" stroke-width="1.4"/><line x1="1.5" y1="6" x2="14.5" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="5" y1="11.5" x2="9" y2="11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
          <span class="nav-label">Templates</span>
        </a>

      </div>

      <!-- Administration (Administrator 전용) -->
      <div class="nav-group" th:if="${canReadAdmin}">
        <div class="nav-group-label">Administration</div>

        <a th:href="@{/configuration/host-groups}"
           th:class="'nav-link' + (${activeMenu}=='hostgroups' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="5" cy="6" r="2.5" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="6" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1 13.5c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9 13.5c0-2.2 1.8-4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
          <span class="nav-label">Host Groups</span>
        </a>

        <a th:href="@{/administration/users}"
           th:class="'nav-link' + (${activeMenu}=='users' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 13.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
          <span class="nav-label">Users</span>
        </a>

        <a th:href="@{/administration/user-groups}"
           th:class="'nav-link' + (${activeMenu}=='usergroups' ? ' active' : '')">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="5" cy="5.5" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="5.5" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M1 13c0-2.2 1.8-4 4-4 1 0 2 .4 2.7 1M9.3 10c.7-.6 1.7-1 2.7-1 2.2 0 4 1.8 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
          <span class="nav-label">User Groups</span>
        </a>

		<a th:href="@{/configuration/settings}"
		   sec:authorize="hasAuthority('Administrator')"
		   th:class="'nav-link' + (${activeMenu}=='config-settings' ? ' active' : '')">
		  <span class="nav-icon">...</span>
		  <span class="nav-label">Settings</span>
		</a>
      </div>

    </nav>

    <div class="sidebar-foot">
      <span class="status-dot" id="serverDot"></span>
      <span class="server-name-label" id="serverNameLabel">Connecting…</span>
    </div>

  </aside>

  <div class="view-wrap">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" onclick="toggleSidebar()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="2" y1="4"  x2="14" y2="4"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="8"  x2="14" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="topbar-page-title" th:text="${pageTitle}">Dashboard</span>
      </div>

      <div class="topbar-right">
        <span class="topbar-clock" id="clock"></span>
        <button class="topbar-icon-btn" onclick="toggleTheme()">
          <span id="themeIcon">☀️</span>
        </button>
        <div class="topbar-user-wrap">
          <div class="topbar-user" onclick="toggleUserMenu()">
            <div class="user-avatar">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M2.5 13.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="user-info">
              <span class="user-name" th:text="${#authentication?.name ?: 'Admin'}">Admin</span>
              <span class="user-role">Administrator</span>
            </div>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="color:var(--text-muted)">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="user-dropdown" id="userDropdown">
            <a href="/profile"  class="dropdown-item">Profile</a>
            <a href="/settings" class="dropdown-item">Settings</a>
            <div class="dropdown-divider"></div>
            <form th:action="@{/logout}" method="post" style="margin:0">
              <button type="submit" class="dropdown-item dropdown-item--danger">Sign out</button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-body" th:insert="~{__${viewName}__ :: content}"></main>

    <!-- FOOTER -->
    <footer class="app-footer">
      <span>Nexis Monitoring Platform <span class="footer-ver">v1.0</span></span>
      <span class="footer-server" id="footerServer"></span>
      <span>&copy; 2026 Nexis</span>
    </footer>

  </div>
</div>

<script>
function toggleSidebar() {
  const s = document.getElementById('shell');
  const hidden = s.classList.toggle('sidebar-hidden');
  localStorage.setItem('nexis-sidebar', hidden ? '0' : '1');
}
(function(){
  if (localStorage.getItem('nexis-sidebar') === '0')
    document.getElementById('shell').classList.add('sidebar-hidden');
})();

function toggleTheme() {
  const h = document.documentElement;
  const icon = document.getElementById('themeIcon');
  const next = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  h.setAttribute('data-theme', next);
  icon.textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('nexis-theme', next);
}
(function(){
  const t = localStorage.getItem('nexis-theme') || 'light';
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
})();

function tick() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
}
tick(); setInterval(tick, 1000);

function toggleUserMenu() {
  document.getElementById('userDropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.topbar-user-wrap'))
    document.getElementById('userDropdown')?.classList.remove('open');
});

function getCsrf() {
  return document.querySelector('meta[name="_csrf"]')?.content || '';
}

/* ── i18n : 저장된 언어 자동 적용 ── */
const NEXIS_I18N = {
  en: {
    'Monitoring':'Monitoring','Configuration':'Configuration','Administration':'Administration',
    'Dashboard':'Dashboard','Hosts':'Hosts','Latest Data':'Latest Data','Problems':'Problems',
    'Templates':'Templates','Host Groups':'Host Groups','Settings':'Settings',
    'Users':'Users','User Groups':'User Groups',
  },
  ko: {
    'Monitoring':'모니터링','Configuration':'구성','Administration':'관리',
    'Dashboard':'대시보드','Hosts':'호스트','Latest Data':'최신 데이터','Problems':'문제',
    'Templates':'템플릿','Host Groups':'호스트 그룹','Settings':'설정',
    'Users':'사용자','User Groups':'사용자 그룹',
    'Add User':'사용자 추가','Edit User':'사용자 편집',
    'User Settings':'사용자 설정',
    'Nexis Server Connection':'Nexis 서버 연결',
    'Database Connection':'데이터베이스 연결',
    'Host Information':'호스트 정보',
    'Linked Templates':'연결된 템플릿',
    'Items':'아이템','Triggers':'트리거',
    'Members':'멤버','Permissions':'권한',
    'Host':'호스트',
  }
};

function applyI18n(lang) {
  const dict = NEXIS_I18N[lang] || NEXIS_I18N['en'];
  document.querySelectorAll('.nav-label, .nav-group-label').forEach(function(el) {
    const orig = el.getAttribute('data-orig') || el.textContent.trim();
    el.setAttribute('data-orig', orig);
    if (dict[orig]) el.textContent = dict[orig];
  });
  const titleEl = document.querySelector('.topbar-page-title');
  if (titleEl) {
    const orig = titleEl.getAttribute('data-orig') || titleEl.textContent.trim();
    titleEl.setAttribute('data-orig', orig);
    if (dict[orig]) titleEl.textContent = dict[orig];
  }
  document.querySelectorAll('.card-title').forEach(function(el) {
    const orig = el.getAttribute('data-orig') || el.textContent.trim();
    el.setAttribute('data-orig', orig);
    if (dict[orig]) el.textContent = dict[orig];
  });
  document.querySelectorAll('.tab-btn').forEach(function(el) {
    const orig = el.getAttribute('data-orig') || el.textContent.trim();
    el.setAttribute('data-orig', orig);
    if (dict[orig]) el.textContent = dict[orig];
  });
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    const key = el.getAttribute('data-i18n');
    if (dict[key]) el.textContent = dict[key];
  });
}

(function applyStoredLang(){
  const lang = localStorage.getItem('nexis-lang') || 'en';
  applyI18n(lang);
})();

fetch('/api/server-info')
  .then(r => r.json())
  .then(d => {
    const dot   = document.getElementById('serverDot');
    const label = document.getElementById('serverNameLabel');
    const foot  = document.getElementById('footerServer');
    if (label) label.textContent = d.serverName || '-';
    if (dot)   dot.classList.add('online');
    if (foot)  foot.textContent  = (d.serverHost || '-') + ':' + (d.serverPort || '-');
  })
  .catch(() => {
    document.getElementById('serverDot')?.classList.add('offline');
    const label = document.getElementById('serverNameLabel');
    if (label) label.textContent = 'Unreachable';
  });
</script>

</body>
</html>
