spring.application.name=nexis-web
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Nexis config file path (설치 시 자동으로 절대경로로 변경됨)
nexis.config.path=/opt/nexis-web/nexis.conf

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Hibernate가 시작 시 DB 연결 없이도 Dialect를 결정할 수 있도록 명시
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.hikari.initialization-fail-timeout=-1

# Logging
logging.file.name=/var/log/nexis-web/nexis-web.log
logging.level.com.nexis=INFO
logging.level.org.springframework.security=INFO